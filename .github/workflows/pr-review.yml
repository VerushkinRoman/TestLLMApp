name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT
          echo "files_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)" >> $GITHUB_OUTPUT

      - name: Configure LLM keys
        run: |
          echo "llm_user_pwd=${{ secrets.LLM_USER_PWD }}" > keys.properties
          echo "github.token=${{ secrets.GITHUB_TOKEN }}" >> keys.properties

      - name: Run AI Code Review
        id: review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          echo "Reviewing PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "Files changed: ${{ steps.diff.outputs.files_changed }}"
          echo "Diff size: ${{ steps.diff.outputs.diff_size }} bytes"
          
          # Build and run the PR review pipeline
          ./gradlew runPrReview --args="${PR_NUMBER}" > review_output.txt 2>&1 || true
          
          echo "review_completed=true" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = 'build/reports/pr_review/review_${{ github.event.pull_request.number }}.md';
            let reviewBody = '';
            
            if (fs.existsSync(reviewPath)) {
              reviewBody = fs.readFileSync(reviewPath, 'utf8');
            } else {
              reviewBody = '⚠️ AI Review could not be generated. Check the workflow logs.';
            }
            
            // Limit to 65536 chars (GitHub max)
            if (reviewBody.length > 60000) {
              reviewBody = reviewBody.substring(0, 60000) + '\n\n...*review truncated due to length*';
            }
            
            const existingComments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });
            
            const aiReviewComment = existingComments.data.find(c => 
              c.user.type === 'Bot' && c.body.includes('AI Code Review')
            );
            
            if (aiReviewComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: aiReviewComment.id,
                body: reviewBody
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: reviewBody
              });
            }
