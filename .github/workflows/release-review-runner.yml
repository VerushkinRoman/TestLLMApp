name: Build & Release AI Review Runner

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle.kts'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew reviewRunnerJar --no-daemon

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-runner
          path: build/libs/review-runner.jar

      - name: Move tag to current commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f review-runner-1.0.0
          git push origin refs/tags/review-runner-1.0.0 --force

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete review-runner-1.0.0 --yes 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: review-runner-1.0.0
          name: AI Review Runner ${{ github.ref_name }}
          body: |
            ## AI Code Review Runner

            Fat JAR для запуска AI ревью PR в CalendarKMP.
            Авто-сборка из main: ${{ github.sha }}

            ### Использование:
            ```bash
            java -jar review-runner.jar <PR_NUMBER> [outputDir] [model]
            ```
          files: build/libs/review-runner.jar
          fail_on_unmatched_files: true
