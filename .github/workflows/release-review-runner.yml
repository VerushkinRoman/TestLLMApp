name: Build & Release AI Review Runner

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle.kts'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew reviewRunnerJar --no-daemon

      - name: Install ProGuard
        run: |
          PROGUARD_VERSION="7.6.1"
          curl -L -o /tmp/proguard.zip "https://github.com/Guardsquare/proguard/releases/download/v${PROGUARD_VERSION}/proguard-${PROGUARD_VERSION}.zip"
          unzip -q /tmp/proguard.zip -d /tmp/
          PROGUARD_DIR=$(ls -d /tmp/proguard-* | head -1)
          echo "PROGUARD_JAR=$PROGUARD_DIR/lib/proguard.jar" >> $GITHUB_ENV

      - name: Minify with ProGuard
        run: |
          cat > build/review-runner.pro << 'RULEOF'
          -injars build/libs/review-runner.jar
          -outjars build/libs/review-runner-min.jar
          -libraryjars <java.home>/jmods
          -dontwarn
          -dontnote
          -keep class com.llmapp.pr_review.** { *; }
          -keep class com.llmapp.rag.data.GitHubApi** { *; }
          -keep class com.llmapp.mcp.GitHubMcpTools** { *; }
          -keep class com.llmapp.api.** { *; }
          -keep class com.llmapp.model.** { *; }
          -keep class kotlin.** { *; }
          -keep class kotlinx.** { *; }
          -keep class io.ktor.** { *; }
          -keep class io.modelcontextprotocol.** { *; }
          -keepattributes *Annotation*, Signature, InnerClasses, EnclosingMethod
          -keepclassmembers class * {
              @kotlinx.serialization.Serializable <fields>;
          }
          -keepclassmembers class * {
              public <init>(...);
          }
RULEOF
          java -jar $PROGUARD_JAR @build/review-runner.pro 2>&1

      - name: Replace with minified JAR
        run: cp build/libs/review-runner-min.jar build/libs/review-runner.jar

      - name: Check final size
        run: ls -lh build/libs/review-runner.jar

      - name: Move tag to current commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f review-runner-1.0.0
          git push origin refs/tags/review-runner-1.0.0 --force

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete review-runner-1.0.0 --yes 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: review-runner-1.0.0
          name: AI Review Runner ${{ github.ref_name }}
          body: |
            ## AI Code Review Runner

            Fat JAR для запуска AI ревью PR в CalendarKMP.
            Авто-сборка из main: ${{ github.sha }}

            ### Использование:
            ```bash
            java -jar review-runner.jar <PR_NUMBER> [outputDir] [model]
            ```
          files: build/libs/review-runner.jar
          fail_on_unmatched_files: true
