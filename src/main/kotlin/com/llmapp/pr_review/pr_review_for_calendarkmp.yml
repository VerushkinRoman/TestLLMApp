name: AI Code Review (CalendarKMP)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Download AI Review Runner
        run: |
          # Скачиваем runner из релиза TestLLMApp или собираем
          curl -L -o review-runner.jar \
            "https://github.com/VerushkinRoman/TestLLMApp/releases/latest/download/review-runner.jar"

      - name: Configure LLM keys
        run: |
          echo "llm_user_pwd=${{ secrets.LLM_USER_PWD }}" > keys.properties
          echo "github.token=${{ secrets.GITHUB_TOKEN }}" >> keys.properties

      - name: Run AI Code Review
        id: review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          java -jar review-runner.jar ${PR_NUMBER} build/reports/pr_review > review_output.txt 2>&1 || true
          echo "review_completed=true" >> $GITHUB_OUTPUT

      - name: Read review report
        id: report
        run: |
          REPORT_FILE="build/reports/pr_review/review_${{ github.event.pull_request.number }}.md"
          if [ -f "$REPORT_FILE" ]; then
            echo "report_content<<EOF" >> $GITHUB_OUTPUT
            cat "$REPORT_FILE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "report_content=⚠️ AI Review could not be generated." >> $GITHUB_OUTPUT
          fi

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const report = `${{ steps.report.outputs.report_content }}`;
            const body = report.length > 60000
              ? report.substring(0, 60000) + '\n\n...*review truncated*'
              : report;

            const comments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('AI Code Review')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }
